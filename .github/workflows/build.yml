name: build

# Compiles the 32-bit AioHud.dll on a Windows runner. On a `v*` tag it publishes a GitHub Release
# with the raw DLL (for the in-game auto-updater) + a full payload zip (for manual install).
on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # create Releases on a tag push

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # No MSVC-setup action needed: build.bat locates Visual Studio itself (vswhere) and sets up the x86 toolchain.
      # Version = the tag (without the leading v) on a release, else dev-<short sha>. Fed to build.bat via env.
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then V="${GITHUB_REF#refs/tags/v}"; else V="dev-${GITHUB_SHA::7}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "AIOHUD_VERSION=$V" >> "$GITHUB_ENV"

      # package.bat calls build.bat (compiles the x86 DLL) then assembles the shippable payload into dist\.
      - name: Build + package
        shell: cmd
        run: package.bat

      # Only build a payload zip on a release tag (it's attached to the Release below). Non-tag pushes just
      # compile to validate the build. (No upload-artifact step -> no third-party Node-20 action ; the
      # in-game updater pulls from Releases, not from CI artifacts.)
      - name: Zip payload
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath "AioHud-${{ steps.ver.outputs.version }}.zip" -Force

      # One user-facing asset : the payload zip (extract into <Windower>\plugins\ -> AioHud.dll + AioHud\).
      # The in-game updater downloads this same zip and extracts it over the install (keeping AioHud\data\).
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: AioHud-*.zip
